<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Abravacom Launcher</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; }
      .controls { display:flex; gap:8px; padding:8px; background:#111; color:#fff }
      button { padding:8px 12px; }
      .terminals { display:flex; height: calc(100vh - 48px); }
      .pane { flex:1; border-left:1px solid #ccc; }
      #t1, #t2 { height:100%; }
    </style>
  </head>
  <body>
    <div class="controls">
      <button id="start-frontend">Start Frontend (3001)</button>
      <button id="stop-frontend">Stop Frontend</button>
      <button id="start-api">Start API (8787)</button>
      <button id="stop-api">Stop API</button>
    </div>
    <div class="terminals">
      <div class="pane"><div id="t1"></div></div>
      <div class="pane"><div id="t2"></div></div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
